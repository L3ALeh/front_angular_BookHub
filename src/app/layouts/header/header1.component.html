<header class="shadow-sm bg-white sticky-top">
  <nav class="navbar navbar-expand-lg navbar-light container py-3">
    <div class="navbar-brand d-flex align-items-center">
      <img src="/logo-bookhub.png" alt="Logo" class="me-3" style="width: 40px; height: 40px;">
      <div class="d-flex flex-column">
        <a routerLink="/" class="fw-bold h5 mb-0 d-none d-sm-block">Bibliothèque Quartier Solidaire</a>
        <span class="fw-bold h5 mb-0 d-block d-sm-none">BookHub</span>
      </div>
    </div>

    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="navbar-nav ms-auto align-items-lg-center gap-2">

        <ng-container *ngIf="(isAuthenticated$ | async)">
          <a class="nav-link px-3" routerLink="/dashboard" routerLinkActive="active">Tableau de bord</a>
          <a class="nav-link px-3" routerLink="/books" routerLinkActive="active">Catalogue</a>
          <a class="nav-link px-3" routerLink="/api/loans" routerLinkActive="active">Mes emprunts</a>
          <a class="btn btn-outline-danger px-4 rounded-pill ms-lg-2" (click)="logout()">Déconnexion</a>
        </ng-container>

        <div *ngIf="!(isAuthenticated$ | async)" class="d-flex gap-2">
          <a routerLink="/login" class="btn btn-outline-primary px-4 rounded-pill">Connexion</a>
          <a routerLink="/register" class="btn btn-primary px-4 rounded-pill text-white">Inscription</a>
        </div>

      </div>
    </div>
  </nav>
</header>
