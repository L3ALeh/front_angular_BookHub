<div class="inscription-container bg-body">
  <div class="inscription-card bg-body-tertiary shadow-lg border">

    <div class="logo-container">
      <div class="logo bg-white shadow-sm">
        <img src="/logo-bookhub.png" alt="Logo Bibliothèque" class="logo-icon">
      </div>
    </div>

    <h1 class="title text-body">Bibliothèque Associative</h1>
    <p class="subtitle text-muted">Connectez-vous à votre compte</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email" class="text-body small fw-bold mb-1">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control bg-body text-body border"
          placeholder="exemple@email.com"
          required
        />
      </div>

      <div class="form-group mt-3">
        <label for="password" class="text-body small fw-bold mb-1">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control bg-body text-body border"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4 rounded-pill py-2 fw-bold" [disabled]="loginForm.invalid">
        Se connecter
      </button>

    </form>

    <div *ngIf="message" class="alert alert-info mt-3 rounded-3 small">
      {{ message }}
    </div>

    <div class="text-center mt-4">
      <a routerLink="/inscription" class="text-primary text-decoration-none small">Pas encore de compte ? Inscrivez-vous</a>
    </div>

  </div>
</div>
