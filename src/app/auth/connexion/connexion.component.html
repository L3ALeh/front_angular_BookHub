<div class="inscription-container">
  <div class="inscription-card">

    <!-- Logo -->
    <div class="logo-container">
      <div class="logo">
        <img src="/logo-bookhub.png" alt="Logo Bibliothèque" class="logo-icon">
      </div>
    </div>

    <h1 class="title">Bibliothèque Associative</h1>
    <p class="subtitle">Connectez-vous à votre compte</p>

    <!-- Formulaire -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="exemple@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" [disabled]="loginForm.invalid">
        Se connecter
      </button>

    </form>

    <div *ngIf="message" class="alert alert-info mt-2">
      {{ message }}
    </div>

    <!-- Lien vers Inscription -->
    <div class="text-center">
      <a routerLink="/inscription">Pas encore de compte ? Inscrivez-vous</a>
    </div>

  </div>
</div>
